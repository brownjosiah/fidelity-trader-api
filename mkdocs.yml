site_name: Fidelity Trader API
site_url: https://brownjosiah.github.io/fidelity-trader-api/
site_description: "Your Fidelity account, your API."
repo_url: https://github.com/brownjosiah/fidelity-trader-api
repo_name: brownjosiah/fidelity-trader-api
docs_dir: docs/site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Safety & Dry-Run: getting-started/safety.md
  - User Guide:
      - CLI Reference: guide/cli.md
      - SDK Reference: guide/sdk.md
      - REST Service: guide/service.md
      - Credential Providers: guide/credentials.md
      - Error Handling: guide/errors.md
  - Project:
      - Architecture: project/architecture.md
      - Development: project/development.md
      - Roadmap: project/roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/brownjosiah/fidelity-trader-api
